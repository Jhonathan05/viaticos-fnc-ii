version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: viaticos-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: viaticos_fnc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: viaticos-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/viaticos_fnc?schema=public"
      JWT_SECRET: "viaticos-fnc-secret-2024-prod"
      PORT: 3000
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: viaticos-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: