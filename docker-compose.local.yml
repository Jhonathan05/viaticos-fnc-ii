version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: viaticos-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: viaticos_fnc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: viaticos-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/viaticos_fnc?schema=public"
      JWT_SECRET: "viaticos-fnc-secret-2024-local"
      PORT: 3000
    volumes:
      - ./backend/formatos:/app/formatos
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: viaticos-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data: